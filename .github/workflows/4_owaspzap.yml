name: OWASP ZAP

on:
  workflow_call

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.STAGE_HOST}}
          port: 22
          username: ${{secrets.STAGE_LOGIN}}
          password: ${{secrets.STAGE_PASSWORD}}

          source: "./docker-compose.yml"
          target: "."

      - name: Downcase Image Name
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Start
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.STAGE_HOST}}
          port: 22
          username: ${{secrets.STAGE_LOGIN}}
          password: ${{secrets.STAGE_PASSWORD}}
          script: |
            echo ${{secrets.YNOV_PAT}} | docker login ghcr.io -u Floriansp40 --password-stdin

            echo YNOV_BACK=ghcr.io/${{env.IMAGE_NAME_LOWER}}-back:latest > .env
            echo YNOV_FRONT=ghcr.io/${{env.IMAGE_NAME_LOWER}}-front:latest >> .env 

            docker pull ghcr.io/${{env.IMAGE_NAME_LOWER}}-back:latest
            docker pull ghcr.io/${{env.IMAGE_NAME_LOWER}}-front:latest

            docker compose up -d

  ZAP_Back_Scan:
    needs: [Deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name:  Zap Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          format: openapi
          target: 'http://${{secrets.STAGE_HOST}}:8000/openapi.json'
          fail_action: true
          artifact_name: 'back_zap_scan'
          issue_title: 'ZAP BACK Scan result'
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ secrets.ZAP_USER_TOKEN }}
          ZAP_AUTH_HEADER_SITE: 'http://${{secrets.STAGE_HOST}}:8000'

      # ── sqlmap en complément ──────────────────────────────────────────
      - name: sqlmap — SQL Injection scann]
        if: always()
        run: |
          pip install sqlmap -q
          sqlmap \
            -u "http://${{secrets.STAGE_HOST}}:8000/tp/sqli/search?q=test" \
            --headers="Authorization: Bearer ${{secrets.ZAP_USER_TOKEN}}" \
            --dbms=sqlite \
            --level=3 \
            --risk=2 \
            --batch \
            --output-dir=sqlmap-report \
            --results-file=sqlmap-report/results.csv
          echo "--- Résumé sqlmap ---"
          cat sqlmap-report/results.csv 2>/dev/null || echo "Aucun résultat CSV"

      - name: Upload sqlmap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlmap-report
          path: sqlmap-report/

  ZAP_Front_Scan:
    needs: [Deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name:  Zap Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:          
          target: 'http://${{secrets.STAGE_HOST}}:3000'
          fail_action: true
          artifact_name: 'front_zap_scan'
          issue_title: 'ZAP FRONT Scan result'
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ secrets.ZAP_USER_TOKEN }}
          ZAP_AUTH_HEADER_SITE: 'http://${{secrets.STAGE_HOST}}:3000'
