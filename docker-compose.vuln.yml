# ╔══════════════════════════════════════════════════════════════╗
# ║  CongesApp — VERSION VULNÉRABLE (pédagogique)               ║
# ║  Lancer : docker-compose -f docker-compose.vuln.yml up      ║
# ║  Frontend : http://localhost:3000                            ║
# ║  API docs : http://localhost:8000/docs                       ║
# ╚══════════════════════════════════════════════════════════════╝

services:
  backend:
    build:
      context: ./backend-vuln
      dockerfile: Dockerfile
    container_name: congesapp-backend-vuln
    ports:
      - "8000:8000"
    volumes:
      - db-data-vuln:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_MODE=vuln
        - REACT_APP_API_URL=http://localhost:8000
    container_name: congesapp-frontend-vuln
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data-vuln:
